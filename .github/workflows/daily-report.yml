name: Daily research report

on:
  workflow_dispatch:
  schedule:
    # 00:00 UTC is 08:00 in Asia/Shanghai.
    - cron: "0 0 * * *"

permissions:
  contents: write
  issues: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate report
        run: python -m daily_research_report --config config/default_config.json --output-dir reports
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Commit report and state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports
          if git diff --cached --quiet; then
            echo "No report changes."
          else
            git commit -m "chore: add daily research report"
            git push
          fi
